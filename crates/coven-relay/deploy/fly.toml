# fly.toml — coven-relay
# Fly.io org: personal (Val's account)
# Region: ord (Chicago)
# Hostname: relay.opencoven.dev
# https://fly.io/docs/reference/configuration/

app = "coven-relay"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    port = 8080
    timeout = "2s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

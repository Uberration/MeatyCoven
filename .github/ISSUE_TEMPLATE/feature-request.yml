name: "Feature request"
description: "Propose a new capability or improvement for Coven."
labels: ["enhancement"]
body:
  - type: textarea
    id: problem-motivation
    attributes:
      label: "Problem / motivation"
      description: "What problem are you hitting? Describe the workflow that is painful or impossible today."
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: "Proposed solution"
      description: "What you want to happen. Concrete CLI/daemon behavior beats abstract goals."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered"
      description: "Other approaches or workarounds you tried or ruled out."
  - type: checkboxes
    id: pre-checks
    attributes:
      label: "Before submitting"
      options:
        - label: "I have checked the [roadmap](https://github.com/OpenCoven/coven/blob/main/docs/ROADMAP.md) and read the [CONTRIBUTING.md](https://github.com/OpenCoven/coven/blob/main/CONTRIBUTING.md) note that larger changes should start from an issue."
          required: true

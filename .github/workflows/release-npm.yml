name: Release npm packages

# Tag-driven, OIDC-authenticated release pipeline.
#
# Trigger: any `v*` tag push starts the workflow.
# Auth: npm trusted publishing via GitHub Actions OIDC — no long-lived NPM_TOKEN required. Configure
#       @opencoven/cli, @opencoven/coven, and each @opencoven/cli-* native package on npmjs.com
#       -> Settings -> Trusted Publishers before the first OIDC release.
# Gate: the `verify-tag` job requires an SSH-signed annotated tag, confirms GitHub has cryptographically
#       verified it, and checks that local git verification trusts the release signing key
#       (e.g. `git config gpg.format ssh && git tag -s v0.0.17 -m "..." && git push origin v0.0.17`).

on:
  push:
    tags:
      - 'v*'

# Workflow-level least-privilege. Individual jobs escalate explicitly.
permissions:
  contents: read

# Never run two release pipelines for the same tag at the same time. We don't cancel an in-flight
# release because that could leave the registry in a partially-published state.
concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Release gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-05-20
        with:
          components: clippy, rustfmt
      - name: Install native link dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libopenblas-dev
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace --locked
      - run: python3 scripts/check-secrets.py

  verify-tag:
    name: Verify signed release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.0
        with:
          fetch-depth: 0
      - name: Confirm tag is annotated, signer-authorized, and points to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_RELEASE_ALLOWED_SIGNERS: ${{ vars.NPM_RELEASE_ALLOWED_SIGNERS }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          TAG_OBJECT_SHA=$(git rev-parse "$TAG_NAME")
          OBJECT_TYPE=$(git cat-file -t "$TAG_OBJECT_SHA")
          if [ "$OBJECT_TYPE" != "tag" ]; then
            echo "::error::Refusing to release: $TAG_NAME is a lightweight tag, not an annotated signed tag. Re-tag with \`git tag -s vX.Y.Z -m ...\`."
            exit 1
          fi
          payload=$(gh api "/repos/$GITHUB_REPOSITORY/git/tags/$TAG_OBJECT_SHA")
          verified=$(jq -r '.verification.verified' <<<"$payload")
          reason=$(jq -r '.verification.reason' <<<"$payload")
          if [ "$verified" != "true" ]; then
            echo "::error::Tag $TAG_NAME does not have a GitHub-verified signature (reason=$reason). Re-tag with a signing key registered to your GitHub account."
            exit 1
          fi
          tag_object_type=$(jq -r '.object.type // ""' <<<"$payload")
          TAGGED_COMMIT_SHA=$(jq -r '.object.sha // ""' <<<"$payload")
          echo "tag=$TAG_NAME verified=$verified reason=$reason target=$TAGGED_COMMIT_SHA"
          if [ "$tag_object_type" != "commit" ] || [ -z "$TAGGED_COMMIT_SHA" ]; then
            echo "::error::Refusing release: annotated tag $TAG_NAME targets ${tag_object_type:-unknown}, not a commit."
            exit 1
          fi
          allowed_signers_raw="${NPM_RELEASE_ALLOWED_SIGNERS:-}"
          if [ -z "${allowed_signers_raw//[[:space:]]/}" ]; then
            echo "::error::Repository variable NPM_RELEASE_ALLOWED_SIGNERS must contain one or more SSH allowed-signers lines."
            exit 1
          fi
          allowed_signers_file="$RUNNER_TEMP/coven-release-allowed-signers"
          printf '%s\n' "$allowed_signers_raw" > "$allowed_signers_file"
          line_number=0
          while IFS= read -r signer_line || [ -n "$signer_line" ]; do
            line_number=$((line_number + 1))
            if [[ "$signer_line" =~ ^[[:space:]]*$ ]]; then
              echo "::error::NPM_RELEASE_ALLOWED_SIGNERS contains an empty line at line $line_number."
              exit 1
            fi
          done < "$allowed_signers_file"
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile "$allowed_signers_file"
          if ! verify_output=$(git verify-tag "$TAG_NAME" 2>&1); then
            printf '%s\n' "$verify_output"
            echo "::error::Release tag $TAG_NAME is not signed by a key in NPM_RELEASE_ALLOWED_SIGNERS."
            exit 1
          fi
          printf '%s\n' "$verify_output"
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$TAGGED_COMMIT_SHA" origin/main; then
            echo "::error::Refusing release: tagged commit $TAGGED_COMMIT_SHA is not contained in origin/main."
            exit 1
          fi

  build-platform:
    name: Build ${{ matrix.npm-target }}
    runs-on: ${{ matrix.runner }}
    needs: [verify, verify-tag]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - npm-target: macos
            rust-target: aarch64-apple-darwin
            runner: macos-latest
            binary: coven
          - npm-target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary: coven
          - npm-target: windows
            rust-target: x86_64-pc-windows-msvc
            runner: windows-latest
            binary: coven.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-05-20
        with:
          targets: ${{ matrix.rust-target }}
      - name: Install native link dependencies
        if: matrix.npm-target == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libopenblas-dev
      - run: cargo build --release --target ${{ matrix.rust-target }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.0
        with:
          name: coven-${{ matrix.npm-target }}
          path: target/${{ matrix.rust-target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  npm-dry-run:
    name: npm publish dry-run
    runs-on: ubuntu-latest
    needs: build-platform
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: 24
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.0
        with:
          name: coven-macos
          path: target/aarch64-apple-darwin/release
      - run: chmod +x target/aarch64-apple-darwin/release/coven
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.0
        with:
          name: coven-linux-x64
          path: target/x86_64-unknown-linux-gnu/release
      - run: chmod +x target/x86_64-unknown-linux-gnu/release/coven
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.0
        with:
          name: coven-windows
          path: target/x86_64-pc-windows-msvc/release
      - run: node scripts/publish-npm.mjs --target=macos --skip-build --dry-run
        env:
          COVEN_NPM_VERSION: ${{ github.ref_name }}
      - run: node scripts/publish-npm.mjs --target=linux-x64 --skip-build --dry-run --skip-wrapper
        env:
          COVEN_NPM_VERSION: ${{ github.ref_name }}
      - run: node scripts/publish-npm.mjs --target=windows --skip-build --dry-run --skip-wrapper
        env:
          COVEN_NPM_VERSION: ${{ github.ref_name }}

  npm-publish:
    name: npm publish
    runs-on: ubuntu-latest
    needs: [build-platform, npm-dry-run]
    # OIDC trusted publishing: id-token:write lets the job mint a short-lived OIDC token
    # that `npm publish --provenance` exchanges with the npm registry for a one-shot
    # publish credential. No NPM_TOKEN secret is read or written.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.0
        with:
          name: coven-macos
          path: target/aarch64-apple-darwin/release
      - run: chmod +x target/aarch64-apple-darwin/release/coven
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.0
        with:
          name: coven-linux-x64
          path: target/x86_64-unknown-linux-gnu/release
      - run: chmod +x target/x86_64-unknown-linux-gnu/release/coven
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.0
        with:
          name: coven-windows
          path: target/x86_64-pc-windows-msvc/release
      - name: Refuse placeholder version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "$TAG" = "v0.0.0" ]; then
            echo "::error::Refusing to publish placeholder version $TAG"
            exit 1
          fi
      - run: node scripts/publish-npm.mjs --target=linux-x64 --skip-build --publish --skip-wrapper
        env:
          COVEN_NPM_VERSION: ${{ github.ref_name }}
      - run: node scripts/publish-npm.mjs --target=windows --skip-build --publish --skip-wrapper
        env:
          COVEN_NPM_VERSION: ${{ github.ref_name }}
      - run: node scripts/publish-npm.mjs --target=macos --skip-build --publish
        env:
          COVEN_NPM_VERSION: ${{ github.ref_name }}
